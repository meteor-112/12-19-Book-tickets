<!-- =============這是 訂票完成(購物車第三頁)================ -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂票完成</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./css/booking.css">
    <link rel="stylesheet" href="./css/navFooter.css">
    <link rel="stylesheet" href="./css/color.css">
    <link rel="stylesheet" href="./css/navFooter.css">
</head>

<body class="bg-my-gray">
    <nav id="nav-container"></nav>
    <main>
        <section class="container mb-5 mt-80">
            <!-- 進度條 -->
            <section class="py-2 mb-4">
                <div class="text-area d-flex justify-content-between mb-2">
                    <div class="section-now text-white">步驟3/3：訂票完成</div>
                    <div class="section-next text-theme">已確認</div>
                </div>
                <div class="progress box-bg-color" role="progressbar">
                    <div class="progress-bar w-100 bg-theme"></div>
                </div>
            </section>
            <!-- 訂票成功 -->
            <section class="d-flex flex-column align-items-center">
                <!-- icon -->
                <div
                    class="icon-shadow position-relative d-flex align-items-center justify-content-center rounded-circle mb-2">
                    <i class="fa-solid fa-circle-check fs-1 text-theme z-1"></i>
                </div>
                <div class="fs-1 text-white fw-bold">恭喜！訂票成功</div>
                <div class="text-secondary-color mb-3">凖備好享受您的精彩夜晚了嗎？</div>

                <!-- 訂票編號 -->
                <div class="text-secondary-color box-bg-color box-border rounded-5 px-md-3 py-md-2 mb-5">
                    <span>訂票編號</span>
                    <span id="order-number" class="ms-2 text-white fw-bold"></span>
                </div>
            </section>

            <!-- 卡片區 -->
            <section class="card box-bg-color box-border rounded-5 overflow-hidden mx-auto">
                <!-- 上半部 -->
                <div class="row g-0 border-b">
                    <!-- 圖片(左) -->
                    <div class="col-md-5 overflow-hidden" style="max-height: 280px;">
                        <img src="./img/unnamed.png" class="w-100 h-100 object-fit-cover"
                            style="object-position: center;">
                    </div>
                    <!-- 活動資訊(右) -->
                    <div class="col-md-7">
                        <div class="card-body">
                            <div class=" text-start p-3">
                                <div class="text-white fw-bold fs-2">The Galactic Tour 2024</div>
                                <div class="text-theme fw-bold fs-5">The Weeknd Live in Taipei</div>
                            </div>
                            <div class="d-flex flex-column gap-2 px-3 text-white">
                                <div>
                                    <i class="fa-regular fa-calendar"></i>
                                    <span>2024/12/24 (五) 19:30</span>
                                </div>
                                <div>
                                    <i class="fa-solid fa-location-dot"></i>
                                    <span></span>台北小巨蛋 Taipai Arena</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 下半部 -->
                <div class="p-4">
                    <!-- 座位資訊與付款詳情 -->
                    <div class="row border-b">
                        <div class="col-md-6 text-secondary-color px-4" id="info-list">
                            座位資訊
                        </div>
                        <div class="col-md-6 text-secondary-color px-4" id="">
                            <span>付款詳情</span>
                            <div class="d-flex justify-content-between border-b py-2">
                                <div class="text-secondary-color">
                                    <div id="show-ticket-count">票價小計</div>
                                    <div>加購品項</div>
                                    <div>手續費</div>
                                </div>
                                <div class="text-end">
                                    <div id="show-ticket-price">$0</div>
                                    <div id="show-add-on-price">$0</div>
                                    <div id="show-fee">$0</div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-end py-3 fw-bold">
                                <div class="fs-5 text-white">總金額</div>
                                <div id="show-total" class="text-theme fs-5"></div>
                            </div>
                        </div>
                    </div>
                    <!-- 底部 -->
                    <div class="row pt-4">
                        <div class="col-lg-6 text-secondary-color">
                            <i class="fa-regular fa-envelope"></i>
                            <span>電子票券與收據已發送至</span>
                            <span id="userMail" class="text-white">user@example.com</span>
                        </div>
                        <a href=""
                            class="col-lg-6 text-lg-end text-theme fw-bold link-offset-2 link-underline link-underline-opacity-0">
                            <i class="fa-solid fa-download"></i>
                            <span>下載電子票券</span>
                        </a>
                    </div>
                </div>
            </section>
            <!-- 按鈕區 -->
            <section class="row gap-4 justify-content-center p-4 mt-4">
                <button class="col-md-3 rounded-5 btn btn-golden py-2" type="button">
                    <i class="fa-solid fa-ticket"></i>
                    <span>查看我的訂單</span>
                </button>
                <button class="col-md-3 rounded-5 btn btn-golden py-2" type="button" id="index-btn">
                    <i class="fa-regular fa-house"></i>
                    <span>回到首頁</span>
                </button>
                <button class="col-md-3 rounded-5 btn btn-golden py-2" type="button" id="next-btn">
                    <i class="fa-regular fa-envelope"></i>
                    <span>聯絡我們</span>
                </button>
            </section>
        </section>
    </main>

    <footer id="footer-container"></footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
    <script>
        // 載入nav和footer的函式
        function loadFooter() {
            const navContainer = document.querySelector('#nav-container');
            const footerContainer = document.querySelector('#footer-container');
            fetch('nav.html')
                .then(function (response) {
                    return response.text(); // 把抓到的檔案轉換成純文字(HTML標籤)
                })
                .then(function (htmlData) {
                    // 塞進我們準備好的空容器裡
                    navContainer.innerHTML = htmlData;
                });
            fetch('footer.html')
                .then(function (response) {
                    return response.text(); // 把抓到的檔案轉換成純文字(HTML標籤)
                })
                .then(function (htmlData) {
                    // 塞進我們準備好的空容器裡
                    footerContainer.innerHTML = htmlData;
                });
        }
        // 網頁載入完成後執行
        document.addEventListener('DOMContentLoaded', loadFooter);
    </script>
    <script>
        const showOrderNumber = document.querySelector('#order-number');
        const orderNumber = new Date().getTime(); // 使用當前時間戳作為訂票編號
        showOrderNumber.textContent = `#${orderNumber}`;
    </script>

    <script>
        const orderData = JSON.parse(localStorage.getItem('myTicketOrder'));
        orderData.selectedDetails.forEach(item => {
            const infoList = document.querySelector('#info-list')
            infoList.innerHTML += `
                            <div class="d-flex gap-2 text-center mb-3">
                                <div class="box-border bg-color flex-fill  py-2 rounded-5">
                                    <div class="text-secondary-color">區域</div>
                                    <div id="zone" class="fs-5 fw-bold text-white">${item.zoneName.replace(/zone-/i, "").toUpperCase()}</div>
                                </div>
                                <div class="box-border bg-color flex-fill  py-2 rounded-5">
                                    <div class="text-secondary-color">排</div>
                                    <div id="row" class="fs-5 fw-bold text-white">${item.row}</div>
                                </div>
                                <div class="box-border bg-color flex-fill  py-2 rounded-5">
                                    <div class="text-secondary-color">號碼</div>
                                    <div id="number" class="fs-5 fw-bold text-white">${item.seatNum}</div>
                                </div>
                            </div>
                            `
        });
        document.querySelector('#show-ticket-price').textContent = `$${orderData.selectedDetails.reduce((total, seat) => total + seat.price, 0)}`;
        document.querySelector('#show-ticket-count').textContent = `票價小計 ${orderData.ticketCountTotal} 張`;
        document.querySelector('#show-fee').textContent = `$${orderData.fee}`;
        document.querySelector('#show-total').textContent = `$${orderData.totalPrice}`
    </script>
    <script>
        const indexBtn = document.querySelector('#index-btn')
        indexBtn.addEventListener(('click'), function () {
            window.location.href = './index.html';
        });

        const nextBtn = document.querySelector('#next-btn')
        nextBtn.addEventListener(('click'), function () {
            window.location.href = './helping.html';
        });
    </script>

    <script>
        // 取出使用者資料
        const data = JSON.parse(localStorage.getItem('userData'));
        console.log(data);
        // 印出郵件位址
        const mail = document.querySelector('#userMail');
        mail.innerHTML = `${data.email}`
    </script>
</body>

</html>
