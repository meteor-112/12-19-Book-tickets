<!DOCTYPE html>
<html lang="en">

<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="./css/booking.css">

  <style>
    .fa-solid.fa-circle {
      font-size: 10px;
    }

    .stage-shape-top {
      background: linear-gradient(to bottom, rgb(44, 37, 31) 0%, rgb(27, 24, 18) 70%);
      height: 120px;
      width: 90%;
      border-radius: 400px 400px 0 0;
    }

    .stage-border {
      border-bottom: 3px solid;
      border-image-source: linear-gradient(to right, transparent 0%, #d4a473 50%, transparent 100%);
      border-image-slice: 1;
    }

    .stage-shape-down {
      background: linear-gradient(to bottom, #201b17 0%, rgb(27, 24, 18) 70%);
      width: 90%;
    }

    .seat-circle {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      margin: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    @media (max-width:540px) {
      .seat-circle {
        transform: scale(0.8);
        margin: 0px;
      }
    }

    @media (max-width:420px) {
      .seat-circle {
        transform: scale(0.7);
        margin: 0px;
      }
    }

    .seat-circle:hover {
      transform: scale(1.1);
      box-shadow: 1px 0px 20px #d4a473;
    }

    .vip-border-start {
      border-left: 5px solid #FFD700;
    }

    .zone-a-border-start {
      border-left: 5px solid #FF69B4;
    }

    .zone-b-border-start {
      border-left: 5px solid #40E0D0;
    }

    .booked {
      pointer-events: none;
    }

    #vip-container,
    #zone-a-container,
    #zone-b-container {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
    }
  </style>
</head>

<body class="bg-my-gray">

  <main>

      <section class="row">

          <h1 class="fw-bold d-flex justify-content-center justify-content-md-start">The Galactic Tour 2024</h1>
          <div class="d-flex row justify-content-between py-3">
            <div
              class="d-flex col-xxl-7 align-items-center mb-3 mb-xxl-0 justify-content-center justify-content-md-start">
              <div class="me-4">
                <i class="fa-solid fa-location-dot"></i>

              </div>

            <div class="d-flex col-xxl-5 justify-content-center justify-content-md-start gap-2">

            </div>

        </div>
        <!-- 右半邊 -->
        <div class="col-lg-4">
          <div class="rounded-5 bg-secondary-gray box-border  text-white p-3">
            <div class="d-flex justify-content-between border-b pb-4">

            </div>
            <div class="py-4 border-b">

              <!-- 選到的位置會根據vip或zone-a或 zone-b 的資料變色-->

            </div>
            <!-- ================================= -->
            <div class="border-b py-4 mb-3">
              <h6>加購項目</h6>
              <div class="form-check">

                  <span class="text-light-gray ms-3">現場領取 - L Size</span>

                  <span class="text-light-gray ms-3">※每筆訂單限加購一次</span>
                </label>

              </div>

  <footer id="footer-container"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- bootstrap的用js做hover文字效果→初始化設定 -->

  <script>
    // 載入nav和footer的函式
    function loadFooter() {
      const navContainer = document.querySelector('#nav-container');
      const footerContainer = document.querySelector('#footer-container');
      fetch('nav.html')
        .then(function (response) {
          return response.text(); // 把抓到的檔案轉換成純文字(HTML標籤)
        })
        .then(function (htmlData) {
          // 塞進我們準備好的空容器裡
          navContainer.innerHTML = htmlData;
        });
      fetch('footer.html')
        .then(function (response) {
          return response.text(); // 把抓到的檔案轉換成純文字(HTML標籤)
        })
        .then(function (htmlData) {
          // 塞進我們準備好的空容器裡
          footerContainer.innerHTML = htmlData;
        });
    }
    // 網頁載入完成後執行
    document.addEventListener('DOMContentLoaded', loadFooter);
  </script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
      const tooltipList = [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el))
    });
  </script>

  <script>
    // ==============倒數計時10分鐘=================
    let countdownElement = document.querySelector('#countdown');
    let timeLeft = 10 * 60;
    function updateCountdown() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      countdownElement.innerHTML = `<i class="fa-regular fa-clock me-1"></i>${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
      if (timeLeft > 0) {
        timeLeft--;
      } else {
        clearInterval(countdownInterval);
        alert('保留時間已到，請重新選擇座位。');
      };
      // 有空再回來做這裡的彈出視窗
    };

    const countdownInterval = setInterval(updateCountdown, 1000);
  </script>

  <script>
    // ==============座位點擊及右半部顯示的部分=================
    // 座位價格跟張數
    let setInfo = {
      'vip': {
        price: 5800,
        count: 0,
      },
      'zone-a': {
        price: 4800,
        count: 0,
      },
      'zone-b': {
        price: 3800,
        count: 0,
      }
    };

    // 先抓左半邊的圈圈座位點擊
    const vipContainer = document.querySelector('#vip-container');
    const zoneAContainer = document.querySelector('#zone-a-container');
    const zoneBContainer = document.querySelector('#zone-b-container');

    // 生成座位的函式

    function seatcircle(a = 0, b = 10, name = 'vip') {
      let container = '';
      for (let i = a; i < Number(b); i++) {
        const row = Math.floor(i / 10) + 1;
        const seatNumber = i + 1;
        const seatId = `${name}-${row}-${seatNumber}`;
        const hoverText = `第 ${row} 排 ${seatNumber} 號 售價 $${setInfo[name].price}`;
        // 已經被選過的座位 = 灰色+不能點擊
        // (先暫時做這樣，之後再回來補紀錄過的座位狀態)

        // 把name直接寫在class裡面
        if (i === 0 || i === 9) {
          container += `<div class="seat-circle bg-secondary bg-gradient vip-seat booked"></div>`;
        } else {
          container += `<div class="seat-circle bg-${name}"
            data-seat-id="${seatId}"
            data-zone="${name}"
            data-row="${row}"
            data-seat="${seatNumber}"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="${hoverText}"></div>`;
        };
      };
      return container;
    };

    // 塞指定的座位數量跟名稱進去+在畫面中長出來
    vipContainer.innerHTML = seatcircle();
    zoneAContainer.innerHTML = seatcircle(10, 30, 'zone-a');
    zoneBContainer.innerHTML = seatcircle(30, 50, 'zone-b');


    // 點擊座位顯示/取消，左半邊顯示打勾+金色背景；右半邊顯示票券詳情的函式
    let selectedSeatsList = [];
    function clickedState(event) {
      const currentSeat = event.currentTarget;
      const { zone, row, seat, seatId } = currentSeat.dataset;
      const showdetail = document.querySelector('#show-detail');
      if (currentSeat.classList.contains('bg-theme')) {
        currentSeat.classList.remove('bg-theme');
        currentSeat.innerHTML = ''
        currentSeat.classList.add(`bg-${zone}`);
        showdetail.removeChild(document.querySelector(`#${currentSeat.dataset.seatId}`));
        ticketCount(zone, -1);
        // 取消選位後，把他從清單裡面拿掉
        selectedSeatsList = selectedSeatsList.filter(item => item.id !== seatId);
      } else {
        currentSeat.classList.remove(`bg-${zone}`);
        currentSeat.innerHTML = `<i class="fa-solid fa-check"></i>`;
        currentSeat.classList.add('bg-theme');
        showdetail.innerHTML += `<div class="px-5 py-3 rounded-pill box-border bg-color mb-2" id="${currentSeat.dataset.seatId}">
                <div class="${zone}-border-start">
                  <div class="ms-4">
                    <span class="fs-6 fw-bold text-${zone}">${zone.toUpperCase()}</span>
                    <br><span>第${currentSeat.dataset.row}排, ${currentSeat.dataset.seat}號</span>
                    <br><span class="fs-6 text-light-gray">一般票</span>
                    <span class="float-end">$${setInfo[zone].price}</span>
                  </div>
                </div>
              </div>`;
        ticketCount(zone, 1);
        // 把選到座位的資訊加入清單
        selectedSeatsList.push({
          id: seatId,
          zoneName: zone.toUpperCase(),
          row: row,
          seatNum: seat,
          price: setInfo[zone].price
        });
      };
    };

    // 顯示出來
    const allSeatCircle = document.querySelectorAll('.seat-circle');
    allSeatCircle.forEach(function (seat) {
      seat.addEventListener('click', clickedState);
    });

    // 張數+-的函式
    function ticketCount(name = 'vip', number = 1) {
      setInfo[name].count += number;
      // console.log(setInfo[name].count);
      totalAll();
    }
  </script>


  <script>
    // ==============右半部金額計算及顯示=================
    // 抓顯示文字的區塊
    const showTicketCount = document.querySelector('#show-ticket-count');
    const showTicketPrice = document.querySelector('#show-ticket-price');
    const showFee = document.querySelector('#show-fee');
    const showAddOnPrice = document.querySelector('#show-add-on-price');
    const showAllTotal = document.querySelector('#show-total');
    // 加購項目
    const addOn = document.querySelector('#add-on-checkbox');
    addOn.addEventListener('change', totalAll);
    const addOnPrice = 800;
    let addOnTotal = 0;
    const fee = 100;

    // 總價函式
    function totalAll() {
      // 張數
      const ticketCountTotal = Object.values(setInfo).reduce(function (total, zone) {
        return total + zone.count;
      }, 0);
      showTicketCount.textContent = `票價小計 ${ticketCountTotal} 張`;

      // 票價小計
      const ticketPriceTotal = Object.values(setInfo).reduce(function (total, zone) {
        return total + (zone.count * zone.price);
      }, 0);
      showTicketPrice.textContent = `$${ticketPriceTotal}`;

      // 加購品項
      if (addOn.checked) {
        addOnTotal = addOnPrice;
      } else {
        addOnTotal = 0;
      };
      showAddOnPrice.textContent = `$${addOnTotal}`;

      // 手續費
      if (ticketCountTotal > 0) {
        showFee.textContent = `$${fee}`;
      } else {
        showFee.textContent = `$0`;
      };

      // 總價
      const allTotal = ticketPriceTotal + addOnTotal + (ticketCountTotal > 0 ? fee : 0);
      showAllTotal.textContent = `$${allTotal}`;
    };
  </script>

  <script>
    function updateSummary() {
      // 建立一個物件，用來打包所有要傳遞到下一頁的訂單資訊
      const orderData = {
        selectedDetails: selectedSeatsList,
        addOn: 0,
        fee: 0,
        totalPrice: 0,
        ticketCountTotal: Object.values(setInfo).reduce(function (total, zone) {
          return total + zone.count;
        }, 0),
      };

      // 計算總張數
      const checkedCount = orderData.selectedDetails.length;

      // 如果沒選票，跳出提示
      if (checkedCount === 0) {
        alert('請至少選擇一個座位！');
        return false;
      };

      const addOnPriceValue = document.querySelector('#add-on-checkbox').checked ? 800 : 0;
      const feeValue = checkedCount > 0 ? 100 : 0;
      let seatsTotal = orderData.selectedDetails.reduce((total, seat) => total + seat.price, 0);

      // 將算好的數字塞進 orderData 中
      orderData.addOn = addOnPriceValue;
      orderData.fee = feeValue;
      orderData.totalPrice = seatsTotal + addOnPriceValue + feeValue;

      // 7. 存檔到 localStorage
      localStorage.setItem('myTicketOrder', JSON.stringify(orderData));
      return true;
    };

    // ==============進下一頁按鈕=================
    const nextBtn = document.querySelector('#next-btn');
    nextBtn.addEventListener('click', function () {
      const isReadyToCheckout = updateSummary();
      if (isReadyToCheckout) {
        window.location.href = './cart-step-2.html';
      }
    });
  </script>
